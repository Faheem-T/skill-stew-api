apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user
          image: faheem222/user
          envFrom:
            - secretRef:
                name: infisical-secrets
          # livenessProbe:
          #   httpGet:
          #     path: /health
          #     port: 3000
          #   failureThreshold: 1
          #   periodSeconds: 10
          # startupProbe:
          #   httpGet:
          #     path: /health
          #     port: 3000
          #   failureThreshold: 30
          #   periodSeconds: 10
          # readinessProbe:
          #   httpGet:
          #     path: /readiness
          #     port: 3000
          #   initialDelaySeconds: 5
          #   periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: user-srv
spec:
  selector:
    app: user
  ports:
    - name: user
      protocol: TCP
      port: 3000
      targetPort: 3000
